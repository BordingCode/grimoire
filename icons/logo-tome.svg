  <g stroke="#9A6BFF" stroke-width="1.4" stroke-linecap="round" opacity="0.85">
    <line x1="50" y1="14" x2="50" y2="20"/>
    <line x1="38" y1="20" x2="42" y2="24"/>
    <line x1="62" y1="20" x2="58" y2="24"/>
