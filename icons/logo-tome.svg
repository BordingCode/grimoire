    <path d="M24 44 C32 42 40 43 46 47"/>
    <path d="M54 47 C60 43 68 42 76 44"/>
    <path d="M24 53 C32 51 40 52 46 56"/>
    <path d="M54 56 C60 52 68 51 76 53"/>
