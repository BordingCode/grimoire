<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1b3d"/>
      <stop offset="1" stop-color="#140d22"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d4aff"/>
      <stop offset="1" stop-color="#3a2a8c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#ffd86b" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffd86b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="215" r="150" fill="url(#glow)"/>
  <!-- book -->
  <g>
    <rect x="118" y="150" width="276" height="244" rx="16" fill="url(#cover)" stroke="#1c1230" stroke-width="8"/>
    <rect x="246" y="150" width="20" height="244" fill="#1c1230"/>
    <!-- pages glint -->
    <rect x="138" y="170" width="98" height="204" rx="8" fill="#efe8ff" opacity="0.12"/>
    <rect x="276" y="170" width="98" height="204" rx="8" fill="#efe8ff" opacity="0.12"/>
  </g>
  <!-- arcane star -->
  <g fill="#ffd86b" transform="translate(256 250)">
    <path d="M0,-92 L20,-26 L88,-26 L33,14 L54,80 L0,40 L-54,80 L-33,14 L-88,-26 L-20,-26 Z"/>
  </g>
  <circle cx="256" cy="250" r="14" fill="#fff7df"/>
