<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16242B"/>
      <stop offset="1" stop-color="#0A1014"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="42%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Arcane Tome — open book + rising rune, centered and kept within the maskable-safe zone -->
  <g transform="translate(26 63) scale(4.6)">
    <circle cx="50" cy="34" r="26" fill="url(#glow)"/>
    <!-- open book: two pages -->
    <path d="M50 70 C40 60 26 60 16 63 L16 38 C26 35 40 35 50 45 Z"
          fill="#13212A" stroke="url(#teal)" stroke-width="2.4" stroke-linejoin="round"/>
    <path d="M50 70 C60 60 74 60 84 63 L84 38 C74 35 60 35 50 45 Z"
          fill="#0E1A20" stroke="url(#teal)" stroke-width="2.4" stroke-linejoin="round"/>
    <!-- spine -->
    <line x1="50" y1="45" x2="50" y2="70" stroke="url(#teal)" stroke-width="2.4" stroke-linecap="round"/>
    <!-- page lines -->
    <g stroke="url(#teal)" stroke-width="1.1" opacity="0.45">
      <path d="M24 44 C32 42 40 43 46 47"/>
      <path d="M54 47 C60 43 68 42 76 44"/>
      <path d="M24 53 C32 51 40 52 46 56"/>
      <path d="M54 56 C60 52 68 51 76 53"/>
    </g>
    <!-- rising rune -->
    <path d="M50 34 l2.4 5 5 2.4 -5 2.4 -2.4 5 -2.4 -5 -5 -2.4 5 -2.4 z" fill="#99F6E4"/>
    <g stroke="#2DD4BF" stroke-width="1.4" stroke-linecap="round" opacity="0.9">
      <line x1="50" y1="14" x2="50" y2="20"/>
      <line x1="38" y1="20" x2="42" y2="24"/>
      <line x1="62" y1="20" x2="58" y2="24"/>
    </g>
  </g>
</svg>
