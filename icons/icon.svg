<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1b3d"/>
      <stop offset="1" stop-color="#140d22"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="48%">
      <stop offset="0%" stop-color="#9A6BFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#9A6BFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0D58A"/>
      <stop offset="100%" stop-color="#C99B3F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Sigil G — monogram bound in a sealing-wax ring; content kept within the central ~70% (maskable-safe) -->
  <g transform="translate(76 76) scale(3.6)">
    <circle cx="50" cy="50" r="46" fill="url(#glow)"/>
    <!-- seal ring -->
    <circle cx="50" cy="50" r="44" stroke="url(#gold)" stroke-width="1.4" opacity="0.6"/>
    <!-- tick marks -->
    <g stroke="url(#gold)" stroke-width="1.6" opacity="0.7">
      <line x1="50" y1="4"  x2="50" y2="9"/>
      <line x1="96" y1="50" x2="91" y2="50"/>
      <line x1="50" y1="96" x2="50" y2="91"/>
      <line x1="4"  y1="50" x2="9"  y2="50"/>
    </g>
    <!-- the G -->
    <path d="M77.8 38.8 A30 30 0 1 0 77.8 61.2 L77.8 50 L54 50"
          stroke="url(#gold)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- sparks -->
    <g fill="#F0D58A">
      <path d="M50 18 l1.4 3 3 1.4 -3 1.4 -1.4 3 -1.4 -3 -3 -1.4 3 -1.4 z" opacity="0.9"/>
      <circle cx="30" cy="72" r="1.3" opacity="0.7"/>
      <circle cx="72" cy="74" r="1.1" opacity="0.6"/>
    </g>
  </g>
</svg>
